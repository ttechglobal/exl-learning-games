<svg width="100%" height="100%" viewBox="0 0 1000 600" preserveAspectRatio="xMidYMax slice" xmlns="http://www.w3.org/2000/svg">
  <title>Atom Forge backdrop — cosy crystal workshop</title>
  <defs>
    <linearGradient id="forgeSky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFE9C7"/>
      <stop offset="55%" stop-color="#FFD9A8"/>
      <stop offset="100%" stop-color="#FFC98C"/>
    </linearGradient>
    <radialGradient id="crystalGlowA" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#B86BFF" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#B86BFF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="crystalGlowB" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2F9BD6" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#2F9BD6" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1000" height="600" fill="url(#forgeSky)"/>

  <!-- distant workshop wall with shelving, soft and out of focus -->
  <rect x="0" y="0" width="1000" height="430" fill="#FFD9A8" opacity="0.4"/>

  <!-- wooden beams -->
  <g opacity="0.5">
    <rect x="0" y="60" width="1000" height="14" fill="#C98A4E"/>
    <rect x="120" y="60" width="20" height="370" fill="#C98A4E"/>
    <rect x="860" y="60" width="20" height="370" fill="#C98A4E"/>
  </g>

  <!-- glowing crystal clusters, the "forge energy" motif, warm not neon -->
  <g>
    <circle cx="150" cy="220" r="90" fill="url(#crystalGlowA)"/>
    <circle cx="850" cy="180" r="100" fill="url(#crystalGlowB)"/>
    <circle cx="500" cy="120" r="70" fill="url(#crystalGlowA)" opacity="0.6"/>
  </g>

  <!-- crystal formations sitting on the back shelf -->
  <g transform="translate(110,300)">
    <path d="M0 60 L20 0 L40 30 L55 -10 L70 60 Z" fill="#C9A6FF" opacity="0.85"/>
    <path d="M0 60 L20 0 L30 20 L20 60 Z" fill="#B86BFF" opacity="0.9"/>
  </g>
  <g transform="translate(830,260)">
    <path d="M0 70 L18 10 L36 40 L52 -6 L68 70 Z" fill="#9FD6F5" opacity="0.85"/>
    <path d="M0 70 L18 10 L26 36 L18 70 Z" fill="#2F9BD6" opacity="0.9"/>
  </g>

  <!-- hanging pendant lamps for cosy workshop feel -->
  <g opacity="0.8">
    <line x1="260" y1="74" x2="260" y2="130" stroke="#C98A4E" stroke-width="3"/>
    <path d="M260 130 L240 160 L280 160 Z" fill="#FFD66B"/>
    <circle cx="260" cy="158" r="6" fill="#FFF3D6"/>

    <line x1="730" y1="74" x2="730" y2="120" stroke="#C98A4E" stroke-width="3"/>
    <path d="M730 120 L712 148 L748 148 Z" fill="#FFD66B"/>
    <circle cx="730" cy="146" r="6" fill="#FFF3D6"/>
  </g>

  <!-- workbench / floor -->
  <path d="M0 430 C 200 410, 400 450, 600 425 C 750 408, 880 440, 1000 415 L1000 600 L0 600 Z" fill="#F2B97C"/>
  <path d="M0 470 C 250 458, 500 485, 750 465 C 850 458, 930 472, 1000 460 L1000 600 L0 600 Z" fill="#E3A463" opacity="0.7"/>

  <!-- soft floating spark particles, warm color -->
  <g fill="#FFD66B" opacity="0.7">
    <circle cx="200" cy="380" r="3"/>
    <circle cx="640" cy="350" r="2.5"/>
    <circle cx="780" cy="400" r="3"/>
    <circle cx="420" cy="360" r="2"/>
  </g>
</svg>
