<svg width="100%" height="100%" viewBox="0 0 1400 800" preserveAspectRatio="xMidYMax slice" xmlns="http://www.w3.org/2000/svg">
  <title>ExamPrep Games homepage hero — a world made of many subjects</title>
  <defs>
