  <!-- legs (slight stance, weight on left) -->
  <path d="M100 282 L94 388 C94 395, 100 399, 107 399 C114 399, 119 395, 118 388 L122 282 Z" fill="#4B2E83"/>
  <path d="M140 282 L146 388 C146 395, 140 399, 133 399 C126 399, 121 395, 122 388 L118 282 Z" fill="#4B2E83"/>
  <path d="M100 282 L96 354 L111 354 L112 282 Z" fill="#3E2569" opacity="0.5"/>
  <path d="M140 282 L144 354 L129 354 L128 282 Z" fill="#3E2569" opacity="0.3"/>

  <!-- shoes -->
  <g>
