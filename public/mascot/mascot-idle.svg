    <circle cx="93" cy="399" r="2" fill="#9CA6B0"/><circle cx="100" cy="401" r="2" fill="#9CA6B0"/>
  </g>
  <g>
    <path d="M152 388 C155 388, 160 393, 157 400 C154 407, 140 409, 127 406 C120 404, 121 396, 128 393 L138 388 Z" fill="#E3E7EB"/>
