    <path d="M152 388 L138 388 L128 393" fill="none" stroke="#C5CCD3" stroke-width="2"/>
    <circle cx="147" cy="399" r="2" fill="#9CA6B0"/><circle cx="140" cy="401" r="2" fill="#9CA6B0"/>
  </g>

  <!-- torso / shirt -->
  <path d="M84 196 C84 172, 99 156, 120 156 C141 156, 156 172, 156 196 L160 270 C160 284, 142 292, 120 292 C98 292, 80 284, 80 270 Z"
