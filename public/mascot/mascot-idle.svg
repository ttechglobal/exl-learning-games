        fill="#8158D6"/>
  <path d="M86 188 C 66 190, 53 204, 52 220" fill="none" stroke="#6B3FB8" stroke-width="3" stroke-linecap="round" opacity="0.4"/>
  <!-- hand resting on hip -->
  <ellipse cx="72" cy="234" rx="13" ry="11" fill="#A9744E"/>

  <!-- LEFT arm: elbow out, hand on hip (viewer's right side of image) -->
  <path d="M154 188
           C 178 188, 192 206, 188 226
           C 186 238, 174 244, 164 238
