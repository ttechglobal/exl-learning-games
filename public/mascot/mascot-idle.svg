        fill="#8158D6"/>
  <path d="M154 188 C 174 190, 187 204, 188 220" fill="none" stroke="#6B3FB8" stroke-width="3" stroke-linecap="round" opacity="0.4"/>
  <ellipse cx="168" cy="234" rx="13" ry="11" fill="#A9744E"/>

  <!-- neck -->
  <rect x="108" y="140" width="24" height="20" rx="9" fill="#A9744E"/>

  <!-- head -->
  <circle cx="120" cy="98" r="50" fill="#B5805A"/>

  <!-- ears -->
  <circle cx="69" cy="102" r="8" fill="#A9744E"/>
  <circle cx="171" cy="102" r="8" fill="#A9744E"/>

  <!-- hair: top + sides, single continuous shape (no clip artifacts) -->
