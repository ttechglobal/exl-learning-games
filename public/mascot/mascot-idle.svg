  <!-- face -->
  <ellipse cx="98" cy="102" rx="7" ry="8.5" fill="#1A1A1A"/>
  <ellipse cx="142" cy="102" rx="7" ry="8.5" fill="#1A1A1A"/>
  <circle cx="100.5" cy="98.5" r="2" fill="#ffffff"/>
  <circle cx="144.5" cy="98.5" r="2" fill="#ffffff"/>
  <path d="M86 87 C 90 83, 98 82, 104 85" fill="none" stroke="#2E1B14" stroke-width="3.5" stroke-linecap="round"/>
  <path d="M136 85 C 142 82, 150 83, 154 87" fill="none" stroke="#2E1B14" stroke-width="3.5" stroke-linecap="round"/>
  <ellipse cx="97" cy="116" rx="6" ry="3.5" fill="#C98A63" opacity="0.5"/>
  <ellipse cx="143" cy="116" rx="6" ry="3.5" fill="#C98A63" opacity="0.5"/>

  <!-- big confident open smile -->
  <path d="M99 124 C 108 138, 132 138, 141 124 C 137 144, 103 144, 99 124 Z" fill="#7A2E1E"/>
  <path d="M103 126 C 112 133, 128 133, 137 126 L 136 129 C 127 135, 113 135, 104 129 Z" fill="#ffffff"/>
